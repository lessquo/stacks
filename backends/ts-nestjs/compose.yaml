services:
  app:
    build: .
    environment:
      PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: stacks
      DB_PASSWORD: stacks
      DB_NAME: stacks
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: rebuild
          path: package.json
        - action: rebuild
          path: tsconfig.json

  db:
    image: postgres:18
    environment:
      POSTGRES_USER: stacks
      POSTGRES_PASSWORD: stacks
      POSTGRES_DB: stacks
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stacks -d stacks"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
