services:
  app:
    build: .
    environment:
      PORT: 8080
    ports:
      - "8080:8080"
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - .venv/
            - pyproject.toml
            - uv.lock
        - action: rebuild
          path: pyproject.toml
        - action: rebuild
          path: uv.lock
