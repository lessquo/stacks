services:
  app:
    build: .
    environment:
      PORT: 8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 120s
    develop:
      watch:
        - action: sync+restart
          path: ./src
          target: /app/src
        - action: rebuild
          path: build.gradle.kts
