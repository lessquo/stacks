services:
  app:
    build: .
    environment:
      PORT: 8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - .venv/
            - pyproject.toml
            - uv.lock
        - action: rebuild
          path: pyproject.toml
        - action: rebuild
          path: uv.lock
