openapi: 3.2.0
info:
  title: stacks API
  version: 0.0.1
  description: >
    Shared contract every backend in this repo implements identically.
    Source of truth — backends conform to this, not the other way around.

paths:
  /:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: OK

  /users:
    post:
      summary: Create a user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUser"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Validation failed
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "409":
          description: Email already exists
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

  /users/{id}:
    get:
      summary: Get a user by id
      operationId: getUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

components:
  schemas:
    User:
      type: object
      required: [id, email, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateUser:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    Problem:
      type: object
      description: RFC 9457 problem details
      properties:
        status:
          type: integer
        title:
          type: string
        detail:
          type: string
